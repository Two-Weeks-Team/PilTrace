<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" style="image-rendering:pixelated">
  <!-- Sungsungi holding flower bouquet with envelope below -->
  <!-- Tail (curled right) -->
  <rect x="46" y="22" width="3" height="3" fill="#8B6914"/>
  <rect x="49" y="20" width="3" height="3" fill="#8B6914"/>
  <rect x="49" y="17" width="3" height="3" fill="#8B6914"/>
  <rect x="46" y="15" width="3" height="3" fill="#8B6914"/>
  <rect x="47" y="13" width="2" height="2" fill="#6B4C2A"/>
  <!-- Left ear -->
  <rect x="14" y="2" width="8" height="7" fill="#8B6914"/>
  <rect x="16" y="4" width="4" height="3" fill="#F0D090"/>
  <!-- Right ear -->
  <rect x="36" y="2" width="8" height="7" fill="#8B6914"/>
  <rect x="38" y="4" width="4" height="3" fill="#F0D090"/>
  <!-- Head -->
  <rect x="18" y="1" width="22" height="20" fill="#D8A040" rx="2"/>
  <!-- Face -->
  <rect x="22" y="5" width="14" height="12" fill="#F0D090" rx="1"/>
  <!-- Eyes -->
  <rect x="25" y="8" width="2" height="4" fill="#402010"/>
  <rect x="31" y="8" width="2" height="4" fill="#402010"/>
  <rect x="25" y="8" width="1" height="1" fill="#FFF" opacity="0.5"/>
  <rect x="31" y="8" width="1" height="1" fill="#FFF" opacity="0.5"/>
  <!-- Blush -->
  <rect x="23" y="12" width="3" height="2" fill="#F4B8C1" opacity="0.7"/>
  <rect x="33" y="12" width="3" height="2" fill="#F4B8C1" opacity="0.7"/>
  <!-- Nose -->
  <rect x="28" y="13" width="2" height="1" fill="#C87040"/>
  <!-- Body -->
  <rect x="20" y="21" width="18" height="12" fill="#D8A040" rx="2"/>
  <rect x="24" y="23" width="10" height="8" fill="#F0D090"/>
  <!-- Left arm (waving) -->
  <rect x="16" y="23" width="4" height="8" fill="#D8A040"/>
  <rect x="14" y="22" width="3" height="4" fill="#F0D090"/>
  <!-- Right arm (holding bouquet) -->
  <rect x="38" y="23" width="4" height="6" fill="#D8A040"/>
  <rect x="40" y="22" width="3" height="3" fill="#F0D090"/>
  <!-- Flower bouquet -->
  <rect x="42" y="14" width="2" height="10" fill="#5B8C5A"/>
  <rect x="44" y="16" width="2" height="8" fill="#5B8C5A"/>
  <rect x="40" y="18" width="2" height="6" fill="#5B8C5A"/>
  <!-- Flower heads (yellow) -->
  <rect x="40" y="10" width="5" height="5" fill="#F0D040" rx="2"/>
  <rect x="44" y="12" width="5" height="5" fill="#F0D040" rx="2"/>
  <rect x="38" y="14" width="4" height="4" fill="#F0D040" rx="2"/>
  <!-- Flower centers -->
  <rect x="42" y="12" width="2" height="2" fill="#D8A040"/>
  <rect x="46" y="14" width="2" height="2" fill="#D8A040"/>
  <!-- Envelope -->
  <rect x="8" y="38" width="48" height="24" fill="#FFFFFF" stroke="#E8DDD0" stroke-width="1" rx="1"/>
  <!-- Envelope flap lines -->
  <line x1="8" y1="38" x2="32" y2="52" stroke="#E8DDD0" stroke-width="1"/>
  <line x1="56" y1="38" x2="32" y2="52" stroke="#E8DDD0" stroke-width="1"/>
  <!-- Star decorations on envelope -->
  <polygon points="16,46 17,48 19,48 17.5,49.5 18,52 16,50.5 14,52 14.5,49.5 13,48 15,48" fill="#9CAF88" opacity="0.4"/>
  <polygon points="44,44 45,46 47,46 45.5,47.5 46,50 44,48.5 42,50 42.5,47.5 41,46 43,46" fill="#9CAF88" opacity="0.4"/>
</svg>
