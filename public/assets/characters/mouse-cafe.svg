<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48" style="image-rendering:pixelated">
  <!-- Mouse with bow and arrow (Cupid style) - Profile view -->
  <!-- Tail (long thin pink) -->
  <rect x="4" y="28" width="2" height="1" fill="#F4B8C1"/>
  <rect x="2" y="27" width="2" height="1" fill="#F4B8C1"/>
  <rect x="1" y="25" width="2" height="2" fill="#F4B8C1"/>
  <rect x="2" y="23" width="2" height="2" fill="#F4B8C1"/>
  <!-- Body -->
  <rect x="14" y="24" width="16" height="12" fill="#C8C8C8" rx="3"/>
  <rect x="18" y="26" width="8" height="8" fill="#E0E0E0" rx="2"/>
  <!-- Left ear -->
  <rect x="14" y="4" width="9" height="9" fill="#E0E0E0" rx="5"/>
  <rect x="16" y="6" width="5" height="5" fill="#F4B8C1" rx="3"/>
  <!-- Right ear -->
  <rect x="27" y="4" width="9" height="9" fill="#E0E0E0" rx="5"/>
  <rect x="29" y="6" width="5" height="5" fill="#F4B8C1" rx="3"/>
  <!-- Head -->
  <rect x="16" y="10" width="16" height="16" fill="#E0E0E0" rx="4"/>
  <!-- Eye (blue, profile) -->
  <rect x="26" y="16" width="3" height="3" fill="#4488CC"/>
  <rect x="27" y="16" width="1" height="1" fill="#FFFFFF" opacity="0.6"/>
  <!-- Nose (pink) -->
  <rect x="30" y="20" width="3" height="2" fill="#F4B8C1"/>
  <!-- Whiskers -->
  <rect x="31" y="18" width="4" height="1" fill="#A0A0A0" opacity="0.5"/>
  <rect x="31" y="22" width="4" height="1" fill="#A0A0A0" opacity="0.5"/>
  <!-- Arm holding bow -->
  <rect x="30" y="26" width="3" height="6" fill="#C8C8C8"/>
  <rect x="32" y="26" width="2" height="2" fill="#E0E0E0"/>
  <!-- Bow (brown) -->
  <path d="M36 20 C40 14, 44 14, 44 20 C44 26, 40 26, 36 20Z" fill="none" stroke="#8B6914" stroke-width="1.5"/>
  <rect x="36" y="19" width="1" height="2" fill="#8B6914"/>
  <!-- Arrow -->
  <rect x="24" y="19.5" width="14" height="1" fill="#A0834E"/>
  <!-- Arrow heart tip -->
  <path d="M22 17 C22 15, 20 14, 20 16 C20 18, 22 19, 22 19 C22 19, 24 18, 24 16 C24 14, 22 15, 22 17Z" fill="#E85880"/>
  <!-- Feet -->
  <rect x="16" y="36" width="4" height="3" fill="#E0E0E0" rx="1"/>
  <rect x="24" y="36" width="4" height="3" fill="#E0E0E0" rx="1"/>
</svg>
