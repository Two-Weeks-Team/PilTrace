<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 64" width="48" height="64" style="image-rendering:pixelated">
  <!-- Green dinosaur holding pink tulip bouquet -->
  <!-- Tail -->
  <rect x="6" y="42" width="6" height="5" fill="#7ABF3F" rx="2"/>
  <rect x="2" y="44" width="6" height="4" fill="#7ABF3F" rx="2"/>
  <rect x="0" y="46" width="4" height="3" fill="#5B8C3A" rx="1"/>
  <!-- Body -->
  <rect x="14" y="30" width="18" height="18" fill="#7ABF3F" rx="3"/>
  <!-- Belly (lighter) -->
  <rect x="18" y="34" width="10" height="10" fill="#A0D870" rx="2"/>
  <!-- Back spots -->
  <rect x="16" y="32" width="3" height="3" fill="#5B8C3A" rx="1"/>
  <rect x="22" y="30" width="3" height="2" fill="#5B8C3A" rx="1"/>
  <rect x="28" y="33" width="2" height="2" fill="#5B8C3A" rx="1"/>
  <!-- Head -->
  <rect x="16" y="10" width="20" height="22" fill="#7ABF3F" rx="4"/>
  <!-- Head crest bumps -->
  <rect x="20" y="6" width="4" height="6" fill="#7ABF3F" rx="2"/>
  <rect x="26" y="4" width="4" height="8" fill="#7ABF3F" rx="2"/>
  <rect x="32" y="6" width="3" height="6" fill="#7ABF3F" rx="1"/>
  <!-- Eye -->
  <rect x="28" y="16" width="4" height="4" fill="#2C4C1A"/>
  <rect x="29" y="16" width="1" height="1" fill="#FFFFFF" opacity="0.5"/>
  <!-- Mouth line -->
  <rect x="30" y="24" width="6" height="1" fill="#5B8C3A"/>
  <rect x="34" y="22" width="2" height="2" fill="#5B8C3A"/>
  <!-- Left arm (holding bouquet) -->
  <rect x="10" y="32" width="4" height="8" fill="#7ABF3F"/>
  <rect x="8" y="30" width="3" height="4" fill="#A0D870"/>
  <!-- Bouquet stems -->
  <rect x="6" y="16" width="1" height="16" fill="#3D6B3D"/>
  <rect x="8" y="18" width="1" height="14" fill="#3D6B3D"/>
  <rect x="10" y="20" width="1" height="12" fill="#3D6B3D"/>
  <!-- Tulip flowers (pink) -->
  <rect x="3" y="10" width="6" height="7" fill="#F4B8C1" rx="2"/>
  <rect x="4" y="11" width="4" height="4" fill="#E85880" rx="1"/>
  <rect x="6" y="12" width="6" height="7" fill="#F4B8C1" rx="2"/>
  <rect x="7" y="13" width="4" height="4" fill="#E85880" rx="1"/>
  <rect x="8" y="15" width="5" height="6" fill="#F4B8C1" rx="2"/>
  <rect x="9" y="16" width="3" height="3" fill="#E85880" rx="1"/>
  <!-- Right arm -->
  <rect x="32" y="34" width="4" height="8" fill="#7ABF3F"/>
  <!-- Feet -->
  <rect x="16" y="48" width="6" height="4" fill="#7ABF3F" rx="1"/>
  <rect x="26" y="48" width="6" height="4" fill="#7ABF3F" rx="1"/>
  <!-- Toes -->
  <rect x="15" y="52" width="3" height="2" fill="#5B8C3A"/>
  <rect x="19" y="52" width="3" height="2" fill="#5B8C3A"/>
  <rect x="25" y="52" width="3" height="2" fill="#5B8C3A"/>
  <rect x="29" y="52" width="3" height="2" fill="#5B8C3A"/>
</svg>
