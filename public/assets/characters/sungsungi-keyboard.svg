<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" style="image-rendering:pixelated">
  <!-- Sungsungi (Monkey) at keyboard - Chibi pixel art -->
  <!-- Tail (curled) -->
  <rect x="44" y="30" width="3" height="3" fill="#8B6914"/>
  <rect x="47" y="28" width="3" height="3" fill="#8B6914"/>
  <rect x="50" y="26" width="3" height="3" fill="#8B6914"/>
  <rect x="50" y="23" width="3" height="3" fill="#8B6914"/>
  <rect x="47" y="21" width="3" height="3" fill="#8B6914"/>
  <rect x="48" y="19" width="2" height="2" fill="#6B4C2A"/>
  <!-- Left ear -->
  <rect x="14" y="8" width="8" height="8" fill="#8B6914"/>
  <rect x="16" y="10" width="4" height="4" fill="#F0D090"/>
  <!-- Right ear -->
  <rect x="38" y="8" width="8" height="8" fill="#8B6914"/>
  <rect x="40" y="10" width="4" height="4" fill="#F0D090"/>
  <!-- Head -->
  <rect x="18" y="6" width="24" height="22" fill="#D8A040" rx="2"/>
  <!-- Face (lighter) -->
  <rect x="22" y="10" width="16" height="14" fill="#F0D090" rx="1"/>
  <!-- Eyes (1x2 vertical black pixels) -->
  <rect x="26" y="14" width="2" height="4" fill="#402010"/>
  <rect x="34" y="14" width="2" height="4" fill="#402010"/>
  <!-- Eye highlights -->
  <rect x="26" y="14" width="1" height="1" fill="#FFFFFF" opacity="0.5"/>
  <rect x="34" y="14" width="1" height="1" fill="#FFFFFF" opacity="0.5"/>
  <!-- Blush (pink cheeks) -->
  <rect x="23" y="18" width="3" height="2" fill="#F4B8C1" opacity="0.7"/>
  <rect x="36" y="18" width="3" height="2" fill="#F4B8C1" opacity="0.7"/>
  <!-- Nose/Mouth -->
  <rect x="30" y="20" width="2" height="1" fill="#C87040"/>
  <rect x="29" y="22" width="4" height="1" fill="#C87040" opacity="0.5"/>
  <!-- Body -->
  <rect x="20" y="28" width="20" height="14" fill="#D8A040" rx="2"/>
  <!-- Belly -->
  <rect x="24" y="30" width="12" height="10" fill="#F0D090" rx="1"/>
  <!-- Arms -->
  <rect x="16" y="32" width="4" height="8" fill="#D8A040"/>
  <rect x="40" y="32" width="4" height="8" fill="#D8A040"/>
  <!-- Hands on keyboard -->
  <rect x="18" y="40" width="4" height="3" fill="#F0D090"/>
  <rect x="38" y="40" width="4" height="3" fill="#F0D090"/>
  <!-- Keyboard -->
  <rect x="12" y="44" width="40" height="14" fill="#F8F0D0" rx="2"/>
  <rect x="12" y="44" width="40" height="2" fill="#E8DDD0"/>
  <!-- Keyboard keys row 1 -->
  <rect x="15" y="47" width="5" height="3" fill="#9CAF88" rx="0.5"/>
  <rect x="22" y="47" width="5" height="3" fill="#9CAF88" rx="0.5"/>
  <rect x="29" y="47" width="5" height="3" fill="#9CAF88" rx="0.5"/>
  <rect x="36" y="47" width="5" height="3" fill="#9CAF88" rx="0.5"/>
  <rect x="43" y="47" width="5" height="3" fill="#9CAF88" rx="0.5"/>
  <!-- Keyboard keys row 2 -->
  <rect x="17" y="52" width="5" height="3" fill="#9CAF88" rx="0.5"/>
  <rect x="24" y="52" width="14" height="3" fill="#9CAF88" rx="0.5"/>
  <rect x="40" y="52" width="5" height="3" fill="#9CAF88" rx="0.5"/>
</svg>
