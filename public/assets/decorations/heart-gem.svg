<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24" style="image-rendering:pixelated">
  <!-- Pink gem heart - pixel art -->
  <!-- Top bumps -->
  <rect x="3" y="5" width="4" height="2" fill="#E85880"/>
  <rect x="9" y="5" width="4" height="2" fill="#E85880"/>
  <rect x="2" y="7" width="6" height="2" fill="#E85880"/>
  <rect x="8" y="7" width="6" height="2" fill="#E85880"/>
  <!-- Top highlights (gem shine) -->
  <rect x="4" y="5" width="2" height="1" fill="#F4B8C1"/>
  <rect x="10" y="5" width="2" height="1" fill="#F4B8C1"/>
  <rect x="3" y="7" width="1" height="1" fill="#F4B8C1"/>
  <rect x="9" y="7" width="1" height="1" fill="#F4B8C1"/>
  <!-- Body -->
  <rect x="1" y="9" width="14" height="2" fill="#E85880"/>
  <rect x="2" y="11" width="12" height="2" fill="#E85880"/>
  <rect x="3" y="13" width="10" height="2" fill="#D04870"/>
  <rect x="4" y="15" width="8" height="2" fill="#D04870"/>
  <rect x="5" y="17" width="6" height="2" fill="#C03860"/>
  <rect x="6" y="19" width="4" height="1" fill="#C03860"/>
  <rect x="7" y="20" width="2" height="1" fill="#B02850"/>
  <!-- Center gem facet line -->
  <rect x="7" y="9" width="2" height="1" fill="#F4B8C1" opacity="0.6"/>
  <rect x="7" y="11" width="2" height="1" fill="#D04870" opacity="0.5"/>
  <!-- Diagonal facet highlights (left) -->
  <rect x="2" y="9" width="1" height="1" fill="#F4B8C1" opacity="0.5"/>
  <rect x="3" y="10" width="1" height="1" fill="#F4B8C1" opacity="0.4"/>
  <rect x="4" y="11" width="1" height="1" fill="#F4B8C1" opacity="0.3"/>
  <!-- Diagonal facet highlights (right) -->
  <rect x="13" y="9" width="1" height="1" fill="#F4B8C1" opacity="0.5"/>
  <rect x="12" y="10" width="1" height="1" fill="#F4B8C1" opacity="0.4"/>
  <rect x="11" y="11" width="1" height="1" fill="#F4B8C1" opacity="0.3"/>
  <!-- Sparkle (top-left) -->
  <rect x="4" y="3" width="1" height="1" fill="#FFFFFF" opacity="0.7"/>
  <rect x="3" y="4" width="1" height="1" fill="#FFFFFF" opacity="0.5"/>
  <rect x="5" y="4" width="1" height="1" fill="#FFFFFF" opacity="0.5"/>
  <!-- Sparkle (top-right) -->
  <rect x="12" y="4" width="1" height="1" fill="#FFFFFF" opacity="0.5"/>
</svg>
