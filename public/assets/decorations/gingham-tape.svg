<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 60 16" width="60" height="16" style="image-rendering:pixelated">
  <!-- Gingham check washi tape - pixel art -->
  <!-- Base white -->
  <rect x="2" y="1" width="56" height="14" fill="#FFFFFF" opacity="0.9"/>
  <!-- Gingham pattern - horizontal stripes -->
  <rect x="2" y="1" width="56" height="4" fill="#9CAF88" opacity="0.3"/>
  <rect x="2" y="9" width="56" height="4" fill="#9CAF88" opacity="0.3"/>
  <!-- Gingham pattern - vertical stripes (creates cross-hatch) -->
  <rect x="2" y="1" width="4" height="14" fill="#9CAF88" opacity="0.3"/>
  <rect x="10" y="1" width="4" height="14" fill="#9CAF88" opacity="0.3"/>
  <rect x="18" y="1" width="4" height="14" fill="#9CAF88" opacity="0.3"/>
  <rect x="26" y="1" width="4" height="14" fill="#9CAF88" opacity="0.3"/>
  <rect x="34" y="1" width="4" height="14" fill="#9CAF88" opacity="0.3"/>
  <rect x="42" y="1" width="4" height="14" fill="#9CAF88" opacity="0.3"/>
  <rect x="50" y="1" width="4" height="14" fill="#9CAF88" opacity="0.3"/>
  <!-- Darker intersections (where h+v stripes overlap) -->
  <rect x="2" y="1" width="4" height="4" fill="#5B8C5A" opacity="0.2"/>
  <rect x="10" y="1" width="4" height="4" fill="#5B8C5A" opacity="0.2"/>
  <rect x="18" y="1" width="4" height="4" fill="#5B8C5A" opacity="0.2"/>
  <rect x="26" y="1" width="4" height="4" fill="#5B8C5A" opacity="0.2"/>
  <rect x="34" y="1" width="4" height="4" fill="#5B8C5A" opacity="0.2"/>
  <rect x="42" y="1" width="4" height="4" fill="#5B8C5A" opacity="0.2"/>
  <rect x="50" y="1" width="4" height="4" fill="#5B8C5A" opacity="0.2"/>
  <rect x="2" y="9" width="4" height="4" fill="#5B8C5A" opacity="0.2"/>
  <rect x="10" y="9" width="4" height="4" fill="#5B8C5A" opacity="0.2"/>
  <rect x="18" y="9" width="4" height="4" fill="#5B8C5A" opacity="0.2"/>
  <rect x="26" y="9" width="4" height="4" fill="#5B8C5A" opacity="0.2"/>
  <rect x="34" y="9" width="4" height="4" fill="#5B8C5A" opacity="0.2"/>
  <rect x="42" y="9" width="4" height="4" fill="#5B8C5A" opacity="0.2"/>
  <rect x="50" y="9" width="4" height="4" fill="#5B8C5A" opacity="0.2"/>
  <!-- Torn left edge -->
  <rect x="0" y="2" width="2" height="12" fill="#F0EDE8" opacity="0.6"/>
  <rect x="0" y="4" width="1" height="2" fill="#9CAF88" opacity="0.3"/>
  <rect x="1" y="1" width="1" height="1" fill="#FFFFFF" opacity="0.4"/>
  <rect x="0" y="10" width="1" height="3" fill="#9CAF88" opacity="0.2"/>
  <!-- Torn right edge -->
  <rect x="58" y="2" width="2" height="12" fill="#F0EDE8" opacity="0.6"/>
  <rect x="59" y="5" width="1" height="3" fill="#9CAF88" opacity="0.3"/>
  <rect x="58" y="13" width="2" height="1" fill="#FFFFFF" opacity="0.3"/>
  <rect x="59" y="10" width="1" height="2" fill="#9CAF88" opacity="0.2"/>
  <!-- Top/bottom torn edges -->
  <rect x="8" y="0" width="3" height="1" fill="#FFFFFF" opacity="0.4"/>
  <rect x="25" y="0" width="2" height="1" fill="#FFFFFF" opacity="0.3"/>
  <rect x="44" y="0" width="3" height="1" fill="#FFFFFF" opacity="0.4"/>
  <rect x="12" y="15" width="2" height="1" fill="#FFFFFF" opacity="0.3"/>
  <rect x="33" y="15" width="3" height="1" fill="#FFFFFF" opacity="0.4"/>
  <rect x="52" y="15" width="2" height="1" fill="#FFFFFF" opacity="0.3"/>
</svg>
