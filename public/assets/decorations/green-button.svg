<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" width="20" height="20" style="image-rendering:pixelated">
  <!-- 4-hole green button - pixel art -->
  <!-- Button body (outer ring) -->
  <rect x="6" y="1" width="8" height="1" fill="#5B8C5A"/>
  <rect x="4" y="2" width="12" height="1" fill="#5B8C5A"/>
  <rect x="3" y="3" width="14" height="1" fill="#5B8C5A"/>
  <rect x="2" y="4" width="16" height="2" fill="#5B8C5A"/>
  <rect x="1" y="6" width="18" height="8" fill="#5B8C5A"/>
  <rect x="2" y="14" width="16" height="2" fill="#5B8C5A"/>
  <rect x="3" y="16" width="14" height="1" fill="#5B8C5A"/>
  <rect x="4" y="17" width="12" height="1" fill="#5B8C5A"/>
  <rect x="6" y="18" width="8" height="1" fill="#5B8C5A"/>
  <!-- Button rim highlight (top-left) -->
  <rect x="6" y="1" width="6" height="1" fill="#7ABF3F" opacity="0.4"/>
  <rect x="4" y="2" width="4" height="1" fill="#7ABF3F" opacity="0.3"/>
  <rect x="3" y="3" width="3" height="1" fill="#7ABF3F" opacity="0.3"/>
  <rect x="2" y="4" width="2" height="2" fill="#7ABF3F" opacity="0.25"/>
  <rect x="1" y="6" width="1" height="4" fill="#7ABF3F" opacity="0.2"/>
  <!-- Button rim shadow (bottom-right) -->
  <rect x="18" y="10" width="1" height="4" fill="#3D6B3C" opacity="0.3"/>
  <rect x="16" y="14" width="2" height="2" fill="#3D6B3C" opacity="0.25"/>
  <rect x="14" y="16" width="3" height="1" fill="#3D6B3C" opacity="0.2"/>
  <rect x="12" y="17" width="4" height="1" fill="#3D6B3C" opacity="0.2"/>
  <!-- Inner recessed area -->
  <rect x="5" y="5" width="10" height="10" fill="#4A7A49"/>
  <rect x="6" y="4" width="8" height="1" fill="#4A7A49"/>
  <rect x="6" y="15" width="8" height="1" fill="#4A7A49"/>
  <rect x="4" y="6" width="1" height="8" fill="#4A7A49"/>
  <rect x="15" y="6" width="1" height="8" fill="#4A7A49"/>
  <!-- 4 holes -->
  <rect x="7" y="7" width="2" height="2" fill="#2A4A29"/>
  <rect x="11" y="7" width="2" height="2" fill="#2A4A29"/>
  <rect x="7" y="11" width="2" height="2" fill="#2A4A29"/>
  <rect x="11" y="11" width="2" height="2" fill="#2A4A29"/>
  <!-- Hole highlights (tiny reflection) -->
  <rect x="7" y="7" width="1" height="1" fill="#3D6B3C" opacity="0.5"/>
  <rect x="11" y="7" width="1" height="1" fill="#3D6B3C" opacity="0.5"/>
  <rect x="7" y="11" width="1" height="1" fill="#3D6B3C" opacity="0.5"/>
  <rect x="11" y="11" width="1" height="1" fill="#3D6B3C" opacity="0.5"/>
  <!-- Thread through holes (X pattern) -->
  <rect x="9" y="8" width="1" height="1" fill="#F5F0E8" opacity="0.6"/>
  <rect x="10" y="9" width="1" height="1" fill="#F5F0E8" opacity="0.6"/>
  <rect x="9" y="10" width="1" height="1" fill="#F5F0E8" opacity="0.6"/>
  <rect x="10" y="11" width="1" height="1" fill="#F5F0E8" opacity="0.6"/>
  <rect x="10" y="8" width="1" height="1" fill="#F5F0E8" opacity="0.4"/>
  <rect x="9" y="9" width="1" height="1" fill="#F5F0E8" opacity="0.4"/>
  <rect x="10" y="10" width="1" height="1" fill="#F5F0E8" opacity="0.4"/>
  <rect x="9" y="11" width="1" height="1" fill="#F5F0E8" opacity="0.4"/>
</svg>
