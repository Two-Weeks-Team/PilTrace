<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32" style="image-rendering:pixelated">
  <!-- Four-leaf clover with heart-shaped leaves - pixel art -->
  <!-- Top leaf (heart shape) -->
  <rect x="13" y="2" width="3" height="2" fill="#5B8C5A"/>
  <rect x="18" y="2" width="3" height="2" fill="#5B8C5A"/>
  <rect x="12" y="4" width="10" height="3" fill="#5B8C5A"/>
  <rect x="13" y="7" width="8" height="2" fill="#5B8C5A"/>
  <rect x="14" y="9" width="6" height="2" fill="#5B8C5A"/>
  <rect x="15" y="11" width="4" height="1" fill="#5B8C5A"/>
  <!-- Top leaf vein -->
  <rect x="16" y="4" width="1" height="1" fill="#3D6B3C"/>
  <rect x="16" y="6" width="1" height="1" fill="#3D6B3C"/>
  <rect x="16" y="8" width="1" height="1" fill="#3D6B3C"/>
  <!-- Top leaf highlight -->
  <rect x="14" y="4" width="2" height="1" fill="#7ABF3F" opacity="0.4"/>
  <rect x="19" y="4" width="2" height="1" fill="#7ABF3F" opacity="0.4"/>
  <!-- Right leaf (heart shape) -->
  <rect x="20" y="13" width="2" height="3" fill="#5B8C5A"/>
  <rect x="22" y="12" width="3" height="10" fill="#5B8C5A"/>
  <rect x="25" y="13" width="2" height="3" fill="#5B8C5A"/>
  <rect x="25" y="18" width="2" height="3" fill="#5B8C5A"/>
  <rect x="27" y="14" width="2" height="6" fill="#5B8C5A"/>
  <rect x="29" y="15" width="1" height="4" fill="#5B8C5A"/>
  <!-- Right leaf vein -->
  <rect x="24" y="16" width="1" height="1" fill="#3D6B3C"/>
  <rect x="26" y="16" width="1" height="1" fill="#3D6B3C"/>
  <!-- Left leaf (heart shape) -->
  <rect x="2" y="15" width="1" height="4" fill="#5B8C5A"/>
  <rect x="3" y="14" width="2" height="6" fill="#5B8C5A"/>
  <rect x="5" y="13" width="2" height="3" fill="#5B8C5A"/>
  <rect x="5" y="18" width="2" height="3" fill="#5B8C5A"/>
  <rect x="7" y="12" width="3" height="10" fill="#5B8C5A"/>
  <rect x="10" y="13" width="2" height="3" fill="#5B8C5A"/>
  <!-- Left leaf vein -->
  <rect x="7" y="16" width="1" height="1" fill="#3D6B3C"/>
  <rect x="5" y="16" width="1" height="1" fill="#3D6B3C"/>
  <!-- Left leaf highlight -->
  <rect x="4" y="14" width="1" height="2" fill="#7ABF3F" opacity="0.4"/>
  <!-- Bottom leaf (heart shape) -->
  <rect x="15" y="20" width="4" height="1" fill="#5B8C5A"/>
  <rect x="14" y="21" width="6" height="2" fill="#5B8C5A"/>
  <rect x="13" y="23" width="8" height="3" fill="#5B8C5A"/>
  <rect x="12" y="26" width="10" height="2" fill="#5B8C5A"/>
  <rect x="13" y="28" width="3" height="2" fill="#5B8C5A"/>
  <rect x="18" y="28" width="3" height="2" fill="#5B8C5A"/>
  <!-- Bottom leaf vein -->
  <rect x="16" y="22" width="1" height="1" fill="#3D6B3C"/>
  <rect x="16" y="24" width="1" height="1" fill="#3D6B3C"/>
  <rect x="16" y="26" width="1" height="1" fill="#3D6B3C"/>
  <!-- Center -->
  <rect x="15" y="14" width="4" height="4" fill="#5B8C5A"/>
  <rect x="16" y="15" width="2" height="2" fill="#3D6B3C"/>
  <!-- Stem -->
  <rect x="16" y="18" width="2" height="2" fill="#506030"/>
  <rect x="17" y="20" width="2" height="1" fill="#506030"/>
</svg>
